<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>景点详情 - 途味</title>
  
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/travel.css">
  
  <style>
    .page-header {
      position: relative;
      height: 500px;
      overflow: hidden;
    }
    
    .page-header__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .page-header__overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
    }
    
    .page-header__content {
      position: absolute;
      bottom: 60px;
      left: 0;
      width: 100%;
      padding: 0 20px;
      color: #fff;
      max-width: 1200px;
      margin: 0 auto;
      right: 0;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .page-header__title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 15px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    
    .page-header__meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 16px;
    }
    
    .detail-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 30px;
    }
    
    .detail-content {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .section-title {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #1E88E5;
    }
    
    .detail-text {
      font-size: 16px;
      line-height: 1.8;
      color: #666;
      margin-bottom: 30px;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .info-item {
      padding: 20px;
      background: #f9f9f9;
      border-radius: 12px;
      border-left: 4px solid #1E88E5;
    }
    
    .info-label {
      font-size: 14px;
      color: #999;
      margin-bottom: 8px;
    }
    
    .info-value {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }
    
    .gallery-item {
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .gallery-item:hover {
      transform: scale(1.05);
    }
    
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .sidebar-card {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .price-box {
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .price-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }
    
    .price-value {
      font-size: 36px;
      font-weight: bold;
      color: #1E88E5;
    }
    
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1E88E5 0%, #64B5F6 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(30, 136, 229, 0.3);
    }
    
    .btn-outline {
      width: 100%;
      padding: 15px;
      background: #fff;
      color: #1E88E5;
      border: 2px solid #1E88E5;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .btn-outline:hover {
      background: #1E88E5;
      color: #fff;
    }
    
    .tip-list {
      list-style: none;
      padding: 0;
    }
    
    .tip-list li {
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    
    .tip-list li:last-child {
      border-bottom: none;
    }
    
    .tip-icon {
      font-size: 20px;
      flex-shrink: 0;
    }
    
    @media screen and (max-width: 768px) {
      .page-header {
        height: 300px;
      }
      
      .page-header__title {
        font-size: 32px;
      }
      
      .detail-grid {
        grid-template-columns: 1fr;
      }
      
      .info-grid {
        grid-template-columns: 1fr;
      }
      
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- 页面头部 -->
  <header class="page-header">
    <img id="headerImage" src="" alt="" class="page-header__image">
    <div class="page-header__overlay"></div>
    <div class="page-header__content">
      <a href="javascript:history.back()" class="back-btn">← 返回</a>
      <h1 class="page-header__title" id="scenicName">加载中...</h1>
      <div class="page-header__meta" id="scenicMeta">
        <!-- 元数据将由 JS 填充 -->
      </div>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="detail-main">
    <div class="detail-grid">
      <!-- 左侧内容 -->
      <div class="detail-content">
        <h2 class="section-title">📖 景点介绍</h2>
        <p class="detail-text" id="scenicDesc">
          加载中...
        </p>
        
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">📍 所在位置</div>
            <div class="info-value" id="scenicLocation">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">⭐ 游客评分</div>
            <div class="info-value" id="scenicRating">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">🎫 门票价格</div>
            <div class="info-value" id="scenicPrice">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">⏰ 开放时间</div>
            <div class="info-value">08:00 - 18:00</div>
          </div>
        </div>
        
        <h3 class="section-title">📸 美景欣赏</h3>
        <div class="gallery" id="scenicGallery">
          <!-- 图片将由 JS 生成 -->
        </div>
      </div>
      
      <!-- 右侧边栏 -->
      <div class="sidebar">
        <div class="sidebar-card">
          <div class="price-box">
            <div class="price-label">参考价格</div>
            <div class="price-value" id="sidebarPrice">¥0</div>
          </div>
          <button class="btn-primary" onclick="planTrip()">
            🗓️ 规划行程
          </button>
          <button class="btn-outline" onclick="toggleFavorite()">
            ❤️ 加入收藏
          </button>
        </div>
        
        <div class="sidebar-card">
          <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 15px;">💡 游玩贴士</h3>
          <ul class="tip-list">
            <li>
              <span class="tip-icon">👔</span>
              <span>建议穿着舒适的鞋子，方便行走</span>
            </li>
            <li>
              <span class="tip-icon">📷</span>
              <span>带好相机，记录美好瞬间</span>
            </li>
            <li>
              <span class="tip-icon">💧</span>
              <span>携带足够的饮用水</span>
            </li>
            <li>
              <span class="tip-icon">🌂</span>
              <span>注意查看天气预报，携带雨具</span>
            </li>
            <li>
              <span class="tip-icon">🎫</span>
              <span>提前网上购票可享受优惠</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer__content">
      <p class="footer__text">© 2026 途味 - 探索美食与美景 版权所有</p>
    </div>
  </footer>

  <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/travel.js"></script>
  
  <script>
    // 模拟景点数据
    const scenicData = {
      1: {
        name: '故宫博物院',
        location: '北京市东城区景山前街 4 号',
        rating: 4.9,
        price: 60,
        image: '../images/travel/gugong.jpg',
        desc: '故宫博物院成立于 1925 年 10 月 10 日，是以明清两代皇宫和宫廷旧藏文物为基础建立起来的大型综合性古代艺术博物馆，是世界文化遗产地、全国重点文物保护单位和爱国主义教育基地。故宫位居世界五大宫之首，被誉为殿宇之海。'
      },
      2: {
        name: '外滩',
        location: '上海市黄浦区中山东一路',
        rating: 4.8,
        price: 0,
        image: '../images/travel/waitan.jpg',
        desc: '外滩位于上海市黄浦区的黄浦江畔，即外黄浦滩，为中国历史文化街区。1844 年（清道光廿四年）起，外滩这一带被划为英国租界，成为上海十里洋场的真实写照，也是旧上海租界区以及整个上海近代城市开始的起点。'
      },
      3: {
        name: '兵马俑',
        location: '陕西省西安市临潼区',
        rating: 4.9,
        price: 150,
        image: '../images/travel/bingmayong.jpg',
        desc: '兵马俑，全称秦始皇兵马俑，是秦始皇陵的陪葬坑，位于今陕西省西安市临潼区秦始皇陵以东 1.5 公里处的兵马俑坑内。兵马俑是中国古代辉煌文明的一张金字名片，被誉为"世界第八大奇迹"。'
      },
      4: {
        name: '九寨沟',
        location: '四川省阿坝藏族羌族自治州',
        rating: 5.0,
        price: 220,
        image: '../images/travel/jiuzhaigou.jpg',
        desc: '九寨沟位于四川省阿坝藏族羌族自治州九寨沟县境内，是一条纵深 50 余千米的山沟谷地，总面积 64297 公顷，森林覆盖率超过 80%。因沟内有树正寨、荷叶寨、则查洼寨等九个藏族村寨坐落在这片高山湖泊群中而得名。'
      }
    };
    
    // 获取 URL 参数
    const scenicId = parseInt(getUrlParam('id') || '1');
    const scenic = scenicData[scenicId] || scenicData[1];
    
    // 填充数据
    document.getElementById('scenicName').textContent = scenic.name;
    document.getElementById('scenicDesc').textContent = scenic.desc;
    document.getElementById('scenicLocation').textContent = scenic.location;
    document.getElementById('scenicRating').textContent = '⭐ '.repeat(Math.floor(scenic.rating)) + ` ${scenic.rating}`;
    document.getElementById('scenicPrice').textContent = scenic.price > 0 ? `¥${scenic.price}` : '免费';
    document.getElementById('sidebarPrice').textContent = scenic.price > 0 ? `¥${scenic.price}` : '免费';
    
    // 设置头图
    const headerImage = document.getElementById('headerImage');
    headerImage.src = scenic.image;
    headerImage.onerror = function() {
      this.src = `https://via.placeholder.com/1200x500/1E88E5/FFFFFF?text=${encodeURIComponent(scenic.name)}`;
    };
    
    // 生成画廊图片
    const gallery = document.getElementById('scenicGallery');
    for (let i = 1; i <= 6; i++) {
      const img = document.createElement('div');
      img.className = 'gallery-item';
      img.innerHTML = `<img src="https://via.placeholder.com/400x300/1E88E5/FFFFFF?text=${encodeURIComponent(scenic.name + ' view ' + i)}" alt="${scenic.name}">`;
      img.onclick = function() {
        showModal(`<img src="${this.querySelector('img').src}" style="width:100%;max-height:80vh;object-fit:contain;">`, scenic.name);
      };
      gallery.appendChild(img);
    }
    
    // 规划行程
    function planTrip() {
      window.location.href = `../index.html#travel`;
      showToast('已跳转到旅游板块', 'success');
    }
    
    // 切换收藏
    function toggleFavorite() {
      let favorites = storage.get('travelFavorites') || [];
      const index = favorites.findIndex(f => f.id === scenicId);
      
      if (index > -1) {
        favorites.splice(index, 1);
        showToast('已取消收藏', 'warning');
      } else {
        favorites.push({
          id: scenicId,
          name: scenic.name,
          location: scenic.location,
          rating: scenic.rating,
          price: scenic.price,
          image: scenic.image
        });
        storage.set('travelFavorites', favorites);
        showToast('收藏成功', 'success');
      }
    }
    
    // 页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
      console.log('景点详情页已加载，ID:', scenicId);
    });
  </script>
</body>
</html>
