<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>扫雷游戏测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test-item { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <h1>无垠扫雷：全域探索 - 功能测试</h1>
    <div id="results"></div>
    
    <script src="game.js"></script>
    <script>
        const results = document.getElementById('results');
        let testsPassed = 0;
        let testsFailed = 0;
        
        function addResult(name, passed, message) {
            const div = document.createElement('div');
            div.className = 'test-item';
            div.innerHTML = `<strong>${name}:</strong> 
                <span class="${passed ? 'pass' : 'fail'}">${passed ? '✓ 通过' : '✗ 失败'}</span>
                ${message ? '- ' + message : ''}`;
            results.appendChild(div);
            if (passed) testsPassed++; else testsFailed++;
        }
        
        // 测试配置加载
        try {
            if (GAME_CONFIG && GAME_CONFIG.modes) {
                addResult('游戏配置加载', true, `包含 ${Object.keys(GAME_CONFIG.modes).length} 个模式`);
            } else {
                addResult('游戏配置加载', false, 'GAME_CONFIG 未正确定义');
            }
        } catch(e) {
            addResult('游戏配置加载', false, e.message);
        }
        
        // 测试模式配置
        try {
            const modes = GAME_CONFIG.modes;
            addResult('新手模式', modes.beginner.rows === 30 && modes.beginner.cols === 20, 
                `${modes.beginner.rows}×${modes.beginner.cols}, ${modes.beginner.mines}雷`);
            addResult('进阶模式', modes.advanced.rows === 60 && modes.advanced.cols === 40, 
                `${modes.advanced.rows}×${modes.advanced.cols}, ${modes.advanced.mines}雷`);
            addResult('大师模式', modes.master.rows === 100 && modes.master.cols === 80, 
                `${modes.master.rows}×${modes.master.cols}, ${modes.master.mines}雷`);
        } catch(e) {
            addResult('模式配置', false, e.message);
        }
        
        // 测试工具函数
        try {
            if (typeof adjustColorBrightness === 'function') {
                const testColor = adjustColorBrightness('#5B9BD5', 20);
                addResult('颜色调整函数', true, `输出：${testColor}`);
            } else {
                addResult('颜色调整函数', false, '函数未定义');
            }
        } catch(e) {
            addResult('颜色调整函数', false, e.message);
        }
        
        // 测试时间格式化
        try {
            if (typeof formatTime === 'function') {
                const test1 = formatTime(0);
                const test2 = formatTime(65);
                addResult('时间格式化', test1 === '0:00' && test2 === '1:05', 
                    `0s=${test1}, 65s=${test2}`);
            } else {
                addResult('时间格式化', false, '函数未定义');
            }
        } catch(e) {
            addResult('时间格式化', false, e.message);
        }
        
        // 测试成就系统
        try {
            if (Array.isArray(ACHIEVEMENTS) && ACHIEVEMENTS.length > 0) {
                addResult('成就系统', true, `包含 ${ACHIEVEMENTS.length} 个成就`);
            } else {
                addResult('成就系统', false, '成就数组未正确定义');
            }
        } catch(e) {
            addResult('成就系统', false, e.message);
        }
        
        // 总结
        setTimeout(() => {
            const summary = document.createElement('div');
            summary.className = 'test-item';
            summary.style.background = testsFailed === 0 ? '#e8f5e9' : '#ffebee';
            summary.innerHTML = `<h2>测试总结</h2>
                <p>通过：${testsPassed} | 失败：${testsFailed}</p>
                <p>${testsFailed === 0 ? '✓ 所有测试通过！游戏可以正常运行' : '✗ 部分测试失败，请检查代码'}</p>`;
            results.appendChild(summary);
        }, 100);
    </script>
</body>
</html>
