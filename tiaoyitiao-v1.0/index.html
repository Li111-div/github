<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跳跳乐 - Jump Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 云朵装饰 */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            animation: float-cloud linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        @keyframes float-cloud {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 100px)); }
        }

        #gameCanvas {
            background: transparent;
            max-width: 100%;
            max-height: 100%;
        }

        /* 蓄力指示器 */
        #powerBar {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #powerBar.active {
            opacity: 1;
        }

        #powerFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4ADE80, #FACC15, #EF4444);
            border-radius: 6px;
            transition: width 0.05s linear;
        }

        /* 分数显示 */
        #scoreDisplay {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Fredoka One', cursive;
            font-size: 48px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3), 
                         0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #scoreDisplay.visible {
            opacity: 1;
        }

        /* 连击显示 */
        #comboDisplay {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #FF6B6B;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        #comboDisplay.visible {
            opacity: 1;
        }

        #comboDisplay.pop {
            transform: translateX(-50%) scale(1.3);
        }

        /* 完美着陆提示 */
        #perfectText {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Fredoka One', cursive;
            font-size: 32px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        #perfectText.show {
            opacity: 1;
            animation: perfect-pop 0.5s ease-out;
        }

        @keyframes perfect-pop {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* 界面遮罩 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            transition: opacity 0.5s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .menu-title {
            font-family: 'Fredoka One', cursive;
            font-size: 56px;
            color: #fff;
            text-shadow: 3px 3px 0 #FF6B6B, 
                         6px 6px 0 rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            text-align: center;
            animation: title-bounce 2s ease-in-out infinite;
        }

        @keyframes title-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-hint {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .high-score {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 20px;
        }

        .high-score span {
            font-family: 'Fredoka One', cursive;
            font-size: 28px;
            color: #FFD700;
        }

        /* 游戏结束界面 */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-title {
            font-family: 'Fredoka One', cursive;
            font-size: 48px;
            color: #FF6B6B;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }

        .final-score span {
            font-family: 'Fredoka One', cursive;
            font-size: 56px;
            color: #FFD700;
            display: block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .best-score {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }

        .best-score span {
            color: #4ADE80;
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
        }

        .restart-btn {
            font-family: 'Nunito', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particle-fade 0.8s ease-out forwards;
        }

        @keyframes particle-fade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .menu-title {
                font-size: 42px;
            }

            #scoreDisplay {
                font-size: 36px;
            }

            #comboDisplay {
                font-size: 20px;
            }

            .game-over-title {
                font-size: 36px;
            }

            .final-score span {
                font-size: 42px;
            }

            #powerBar {
                width: 160px;
            }
        }

        @media (max-height: 500px) {
            .menu-title {
                font-size: 32px;
                margin-bottom: 10px;
            }

            .start-hint {
                font-size: 18px;
                margin-bottom: 15px;
            }

            #scoreDisplay {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- 云朵装饰 -->
        <div class="cloud" style="width: 80px; height: 30px; top: 15%; animation-duration: 25s;"></div>
        <div class="cloud" style="width: 60px; height: 22px; top: 25%; animation-duration: 20s; animation-delay: -10s;"></div>
        <div class="cloud" style="width: 100px; height: 35px; top: 8%; animation-duration: 30s; animation-delay: -5s;"></div>

        <canvas id="gameCanvas"></canvas>

        <div id="scoreDisplay">0</div>
        <div id="comboDisplay"></div>
        <div id="perfectText">完美!</div>

        <div id="powerBar">
            <div id="powerFill"></div>
        </div>

        <div id="overlay">
            <div class="menu-title">跳跳乐</div>
            <div class="start-hint">按住屏幕蓄力，松开跳跃</div>
            <div class="high-score">最高分: <span id="highScoreStart">0</span></div>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-title">游戏结束</div>
            <div class="final-score">
                得分
                <span id="finalScore">0</span>
            </div>
            <div class="best-score">最高分: <span id="highScoreEnd">0</span></div>
            <button class="restart-btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            canvasWidth: 600,
            canvasHeight: 800,
            playerRadius: 20,
            platformHeight: 15,
            platformMinWidth: 60,
            platformMaxWidth: 120,
            minGap: 80,
            maxGap: 250,
            maxPower: 1.5,
            gravity: 0.6,
            colors: {
                player: '#FF6B6B',
                playerFace: '#2C3E50',
                platform1: '#4A90D9',
                platform2: '#5BA3EC',
                perfectZone: 'rgba(255, 215, 0, 0.3)'
            }
        };

        // 游戏状态
        const game = {
            canvas: null,
            ctx: null,
            state: 'menu', // menu, playing, jumping, gameOver
            player: { x: 0, y: 0, vy: 0 },
            platforms: [],
            cameraX: 0,
            score: 0,
            highScore: 0,
            combo: 0,
            isPowering: false,
            power: 0,
            powerTime: 0,
            lastTimestamp: 0
        };

        // DOM 元素
        const elements = {
            container: document.getElementById('gameContainer'),
            canvas: document.getElementById('gameCanvas'),
            scoreDisplay: document.getElementById('scoreDisplay'),
            comboDisplay: document.getElementById('comboDisplay'),
            perfectText: document.getElementById('perfectText'),
            powerBar: document.getElementById('powerBar'),
            powerFill: document.getElementById('powerFill'),
            overlay: document.getElementById('overlay'),
            gameOverScreen: document.getElementById('gameOverScreen'),
            finalScore: document.getElementById('finalScore'),
            highScoreStart: document.getElementById('highScoreStart'),
            highScoreEnd: document.getElementById('highScoreEnd'),
            restartBtn: document.getElementById('restartBtn')
        };

        // 初始化
        function init() {
            game.canvas = elements.canvas;
            game.ctx = game.canvas.getContext('2d');

            // 设置画布大小
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 加载最高分
            const saved = localStorage.getItem('jumpJourneyHighScore');
            game.highScore = saved ? parseInt(saved) : 0;
            elements.highScoreStart.textContent = game.highScore;

            // 绑定事件
            bindEvents();

            // 开始游戏循环
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            const container = elements.container;
            const width = container.clientWidth;
            const height = container.clientHeight;

            // 根据屏幕尺寸调整
            let canvasWidth, canvasHeight;

            if (width < 768) {
                // 手机
                canvasWidth = Math.min(width, 400);
                canvasHeight = height;
            } else {
                // 电脑
                canvasWidth = CONFIG.canvasWidth;
                canvasHeight = Math.min(height, CONFIG.canvasHeight);
            }

            game.canvas.width = canvasWidth;
            game.canvas.height = canvasHeight;

            // 更新配置中的显示尺寸
            CONFIG.displayWidth = canvasWidth;
            CONFIG.displayHeight = canvasHeight;
        }

        function bindEvents() {
            // 鼠标/触摸事件
            const startAction = (e) => {
                e.preventDefault();
                if (game.state === 'playing') {
                    game.isPowering = true;
                    game.powerTime = 0;
                    elements.powerBar.classList.add('active');
                }
            };

            const endAction = (e) => {
                e.preventDefault();
                if (game.state === 'playing' && game.isPowering) {
                    jump();
                }
            };

            // 电脑
            document.addEventListener('mousedown', startAction);
            document.addEventListener('mouseup', endAction);

            // 手机
            document.addEventListener('touchstart', startAction, { passive: false });
            document.addEventListener('touchend', endAction, { passive: false });

            // 重新开始按钮
            elements.restartBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                startGame();
            });

            // 开始游戏
            elements.overlay.addEventListener('click', () => {
                if (game.state === 'menu') {
                    startGame();
                }
            });
        }

        function startGame() {
            game.state = 'playing';
            game.score = 0;
            game.combo = 0;
            game.cameraX = 0;
            game.isPowering = false;
            game.power = 0;

            // 创建初始平台和玩家
            createInitialPlatforms();
            game.player.x = game.platforms[0].x + game.platforms[0].width / 2;
            game.player.y = game.platforms[0].y - CONFIG.playerRadius;
            game.player.vy = 0;

            // 更新UI
            elements.overlay.classList.add('hidden');
            elements.gameOverScreen.classList.remove('visible');
            elements.scoreDisplay.textContent = '0';
            elements.scoreDisplay.classList.add('visible');
            elements.comboDisplay.classList.remove('visible');
            elements.powerBar.classList.remove('active');
            elements.powerFill.style.width = '0%';
        }

        function createInitialPlatforms() {
            game.platforms = [];

            // 第一个平台（玩家站立）
            const firstPlatform = {
                x: 100,
                y: getPlatformY(0),
                width: 100,
                height: CONFIG.platformHeight,
                color: 0
            };
            game.platforms.push(firstPlatform);

            // 生成更多平台
            for (let i = 1; i < 8; i++) {
                addPlatform();
            }
        }

        function getPlatformY(index) {
            // 平台高度随距离略微变化
            const baseY = CONFIG.displayHeight * 0.7;
            return baseY;
        }

        function addPlatform() {
            const lastPlatform = game.platforms[game.platforms.length - 1];
            
            // 根据分数增加难度
            const difficulty = Math.min(game.score / 50, 1);
            
            // 随机间距
            const gap = CONFIG.minGap + Math.random() * (CONFIG.maxGap - CONFIG.minGap) * (0.5 + difficulty * 0.5);
            
            // 随机宽度
            const widthRange = CONFIG.platformMaxWidth - CONFIG.platformMinWidth;
            const width = CONFIG.platformMaxWidth - Math.random() * widthRange * (0.3 + difficulty * 0.7);
            
            // 随机左右偏移
            const maxOffset = 150;
            let newX = lastPlatform.x + lastPlatform.width / 2 + gap;
            
            // 偶尔有左右偏移
            if (Math.random() > 0.5) {
                newX += (Math.random() - 0.5) * maxOffset;
            }

            const platform = {
                x: newX,
                y: getPlatformY(game.platforms.length),
                width: Math.max(width, 40),
                height: CONFIG.platformHeight,
                color: game.platforms.length % 2
            };

            game.platforms.push(platform);
        }

        function jump() {
            game.isPowering = false;
            elements.powerBar.classList.remove('active');

            // 计算跳跃力
            const powerRatio = game.powerTime / CONFIG.maxPower;
            const jumpPower = 12 + powerRatio * 8; // 12-20
            
            game.player.vy = -jumpPower;
            game.state = 'jumping';

            // 重置蓄力
            game.power = 0;
            game.powerTime = 0;
            elements.powerFill.style.width = '0%';
        }

        function update(timestamp) {
            if (!game.lastTimestamp) game.lastTimestamp = timestamp;
            const deltaTime = (timestamp - game.lastTimestamp) / 16.67; // 标准化到60fps
            game.lastTimestamp = timestamp;

            // 更新蓄力
            if (game.isPowering) {
                game.powerTime += deltaTime * 0.016;
                if (game.powerTime > CONFIG.maxPower) {
                    game.powerTime = CONFIG.maxPower;
                }
                const powerPercent = (game.powerTime / CONFIG.maxPower) * 100;
                elements.powerFill.style.width = powerPercent + '%';
            }

            // 更新玩家
            if (game.state === 'jumping') {
                game.player.vy += CONFIG.gravity * deltaTime;
                game.player.y += game.player.vy * deltaTime;
                game.player.x += (getJumpDirection() * (10 + game.powerTime * 5)) * deltaTime;

                // 相机跟随
                const targetCameraX = game.player.x - CONFIG.displayWidth * 0.3;
                if (targetCameraX > game.cameraX) {
                    game.cameraX = targetCameraX;
                }

                // 检测落地
                checkLanding();
            }

            // 移除屏幕外的平台
            game.platforms = game.platforms.filter(p => p.x + p.width > game.cameraX - 100);

            // 添加新平台
            const lastPlatform = game.platforms[game.platforms.length - 1];
            if (lastPlatform && lastPlatform.x < game.cameraX + CONFIG.displayWidth + 200) {
                addPlatform();
            }

            // 检查掉落
            checkFall();
        }

        function getJumpDirection() {
            // 简单的向右跳跃
            return 1;
        }

        function checkLanding() {
            for (const platform of game.platforms) {
                if (game.player.vy > 0 && // 正在下落
                    game.player.y + CONFIG.playerRadius >= platform.y &&
                    game.player.y + CONFIG.playerRadius <= platform.y + platform.height + 10 &&
                    game.player.x >= platform.x &&
                    game.player.x <= platform.x + platform.width) {
                    
                    // 成功着陆
                    landOnPlatform(platform);
                    return;
                }
            }
        }

        function landOnPlatform(platform) {
            game.player.y = platform.y - CONFIG.playerRadius;
            game.player.vy = 0;
            game.state = 'playing';

            // 计算得分
            game.combo++;
            const centerX = platform.x + platform.width / 2;
            const distFromCenter = Math.abs(game.player.x - centerX);
            const perfectZone = platform.width * 0.3;

            let points = 1;
            if (distFromCenter < perfectZone) {
                points = 2;
                showPerfect();
            }

            // 计算连击倍数
            let multiplier = 1;
            if (game.combo >= 5) multiplier = 3;
            else if (game.combo >= 3) multiplier = 2;

            game.score += points * multiplier;

            // 更新显示
            updateScoreDisplay();
            showCombo();

            // 粒子效果
            createParticles(game.player.x, game.player.y);
        }

        function showPerfect() {
            elements.perfectText.classList.add('show');
            setTimeout(() => {
                elements.perfectText.classList.remove('show');
            }, 600);
        }

        function updateScoreDisplay() {
            elements.scoreDisplay.textContent = game.score;
        }

        function showCombo() {
            if (game.combo >= 3) {
                const multiplier = game.combo >= 5 ? 3 : (game.combo >= 3 ? 2 : 1);
                elements.comboDisplay.textContent = `${game.combo}连击 x${multiplier}`;
                elements.comboDisplay.classList.add('visible');
                elements.comboDisplay.classList.add('pop');
                setTimeout(() => {
                    elements.comboDisplay.classList.remove('pop');
                }, 200);
            } else {
                elements.comboDisplay.classList.remove('visible');
            }
        }

        function checkFall() {
            if (game.player.y > CONFIG.displayHeight + 100) {
                gameOver();
            }
        }

        function gameOver() {
            game.state = 'gameOver';

            // 更新最高分
            if (game.score > game.highScore) {
                game.highScore = game.score;
                localStorage.setItem('jumpJourneyHighScore', game.highScore);
            }

            // 显示结束界面
            elements.finalScore.textContent = game.score;
            elements.highScoreEnd.textContent = game.highScore;
            elements.highScoreStart.textContent = game.highScore;
            elements.gameOverScreen.classList.add('visible');
            elements.scoreDisplay.classList.remove('visible');
            elements.comboDisplay.classList.remove('visible');
        }

        function createParticles(x, y) {
            const colors = ['#FFD700', '#FF6B6B', '#4ADE80', '#60A5FA'];
            
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = 8 + Math.random() * 8;
                const angle = (Math.PI * 2 / 8) * i;
                const distance = 30 + Math.random() * 40;
                const targetX = x + Math.cos(angle) * distance;
                const targetY = y + Math.sin(angle) * distance;

                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = (x * (CONFIG.displayWidth / CONFIG.canvasWidth)) + 'px';
                particle.style.top = y + 'px';

                elements.container.appendChild(particle);

                // 动画
                particle.animate([
                    { left: x + 'px', top: y + 'px', transform: 'scale(1)' },
                    { left: targetX + 'px', top: targetY + 'px', transform: 'scale(0)' }
                ], {
                    duration: 600,
                    easing: 'ease-out'
                });

                setTimeout(() => particle.remove(), 600);
            }
        }

        function render() {
            const ctx = game.ctx;
            const width = game.canvas.width;
            const height = game.canvas.height;

            // 清除画布
            ctx.clearRect(0, 0, width, height);

            // 保存上下文
            ctx.save();

            // 应用相机偏移
            ctx.translate(-game.cameraX * (width / CONFIG.canvasWidth), 0);

            // 绘制平台
            for (const platform of game.platforms) {
                drawPlatform(ctx, platform);
            }

            // 绘制玩家
            drawPlayer(ctx);

            ctx.restore();
        }

        function drawPlatform(ctx, platform) {
            const scaleX = CONFIG.displayWidth / CONFIG.canvasWidth;
            
            // 平台阴影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            roundRect(ctx, platform.x * scaleX, platform.y + 4, platform.width * scaleX, platform.height, 8);
            ctx.fill();

            // 平台主体
            ctx.fillStyle = platform.color === 0 ? CONFIG.colors.platform1 : CONFIG.colors.platform2;
            roundRect(ctx, platform.x * scaleX, platform.y, platform.width * scaleX, platform.height, 8);
            ctx.fill();

            // 完美着陆区域提示
            if (game.state === 'playing' || game.state === 'jumping') {
                const centerX = platform.x + platform.width / 2;
                const perfectZone = platform.width * 0.3;
                
                ctx.fillStyle = CONFIG.colors.perfectZone;
                ctx.fillRect(
                    (centerX - perfectZone) * scaleX,
                    platform.y,
                    perfectZone * 2 * scaleX,
                    platform.height
                );
            }
        }

        function drawPlayer(ctx) {
            const scaleX = CONFIG.displayWidth / CONFIG.canvasWidth;
            const x = game.player.x * scaleX;
            const y = game.player.y;
            const r = CONFIG.playerRadius;

            // 挤压效果
            let scaleY = 1;
            let scaleXPlayer = 1;
            
            if (game.isPowering) {
                // 蓄力时压缩
                const powerRatio = game.powerTime / CONFIG.maxPower;
                scaleY = 1 - powerRatio * 0.3;
                scaleXPlayer = 1 + powerRatio * 0.2;
            } else if (game.state === 'jumping') {
                // 跳跃时拉伸
                if (game.player.vy < 0) {
                    scaleY = 1.2;
                    scaleXPlayer = 0.85;
                } else {
                    scaleY = 0.9;
                    scaleXPlayer = 1.1;
                }
            }

            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scaleXPlayer, scaleY);

            // 身体阴影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.beginPath();
            ctx.ellipse(0, r - 2, r * 0.8, r * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            // 身体
            ctx.fillStyle = CONFIG.colors.player;
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();

            // 高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(-r * 0.3, -r * 0.3, r * 0.4, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            const eyeOffsetX = 6;
            const eyeOffsetY = -3;
            const eyeRadius = 4;

            // 左眼
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-eyeOffsetX, eyeOffsetY, eyeRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 右眼
            ctx.beginPath();
            ctx.arc(eyeOffsetX, eyeOffsetY, eyeRadius, 0, Math.PI * 2);
            ctx.fill();

            // 眼珠
            ctx.fillStyle = CONFIG.colors.playerFace;
            ctx.beginPath();
            ctx.arc(-eyeOffsetX + 1, eyeOffsetY, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeOffsetX + 1, eyeOffsetY, 2, 0, Math.PI * 2);
            ctx.fill();

            // 微笑
            ctx.strokeStyle = CONFIG.colors.playerFace;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.arc(0, 2, 6, 0.2, Math.PI - 0.2);
            ctx.stroke();

            ctx.restore();
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function gameLoop(timestamp) {
            if (game.state === 'playing' || game.state === 'jumping') {
                update(timestamp);
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        window.addEventListener('load', init);
    </script>
</body>
</html>
