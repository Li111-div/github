<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购物车 - 途味</title>
  
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/food.css">
  
  <style>
    .page-header {
      background: linear-gradient(135deg, #FF7F24 0%, #FFB366 100%);
      padding: 80px 20px 40px;
      color: #fff;
    }
    
    .page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .cart-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 30px;
    }
    
    .cart-items {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .cart-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    
    .cart-item:last-child {
      border-bottom: none;
    }
    
    .cart-item__image {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      object-fit: cover;
    }
    
    .cart-item__info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .cart-item__name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .cart-item__price {
      font-size: 20px;
      font-weight: bold;
      color: #FF7F24;
    }
    
    .cart-item__quantity {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .quantity-control {
      display: flex;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .quantity-control button {
      width: 35px;
      height: 35px;
      background: #f5f5f5;
      border: none;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
    }
    
    .quantity-control button:hover {
      background: #FF7F24;
      color: #fff;
    }
    
    .quantity-control span {
      width: 50px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .cart-item__actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .btn-remove {
      padding: 8px 15px;
      background: #f5576c;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .btn-remove:hover {
      background: #d63c52;
      transform: scale(1.05);
    }
    
    .cart-summary {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      height: fit-content;
      position: sticky;
      top: 80px;
    }
    
    .summary-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #FF7F24;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 15px;
    }
    
    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
      font-size: 20px;
      font-weight: bold;
    }
    
    .total-price {
      color: #FF7F24;
      font-size: 28px;
    }
    
    .btn-checkout {
      width: 100%;
      padding: 15px;
      margin-top: 25px;
      background: linear-gradient(135deg, #FF7F24 0%, #FFB366 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 127, 36, 0.3);
    }
    
    .empty-cart {
      text-align: center;
      padding: 80px 20px;
    }
    
    .empty-cart__icon {
      font-size: 100px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-cart__text {
      font-size: 18px;
      color: #999;
      margin-bottom: 30px;
    }
    
    @media screen and (max-width: 768px) {
      .cart-grid {
        grid-template-columns: 1fr;
      }
      
      .cart-item {
        grid-template-columns: 80px 1fr;
      }
      
      .cart-item__actions {
        grid-row: 1;
        grid-column: 2;
        flex-direction: row;
        justify-content: flex-end;
      }
      
      .cart-summary {
        position: static;
      }
    }
  </style>
</head>
<body>
  <!-- 页面头部 -->
  <header class="page-header">
    <div class="page-header__container">
      <a href="../index.html" class="back-btn">← 继续购物</a>
      <h1 style="font-size: 32px; font-weight: bold;">🛒 我的购物车</h1>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="page-container">
    <div id="cartContent">
      <!-- 购物车内容将由 JS 动态生成 -->
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer__content">
      <p class="footer__text">© 2026 途味 - 探索美食与美景 版权所有</p>
    </div>
  </footer>

  <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/food.js"></script>
  
  <script>
    // 渲染购物车页面
    function renderCart() {
      const cart = storage.get('foodCart') || [];
      const container = document.getElementById('cartContent');
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="cart-items">
            <div class="empty-cart">
              <div class="empty-cart__icon">🛒</div>
              <p class="empty-cart__text">购物车空空如也～</p>
              <a href="../index.html" class="btn btn--warning">去逛逛</a>
            </div>
          </div>
        `;
        return;
      }
      
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
      
      container.innerHTML = `
        <div class="cart-grid">
          <div class="cart-items">
            <h2 style="margin-bottom: 20px;">购物车商品 (${cart.length}件)</h2>
            ${cart.map((item, index) => `
              <div class="cart-item" data-index="${index}">
                <img src="${item.image}" alt="${item.name}" class="cart-item__image" 
                     onerror="this.src='https://via.placeholder.com/100x100/FF7F24/FFFFFF?text=${encodeURIComponent(item.name)}'">
                <div class="cart-item__info">
                  <h3 class="cart-item__name">${item.name}</h3>
                  <div class="cart-item__price">¥${item.price}</div>
                </div>
                <div class="cart-item__quantity">
                  <div class="quantity-control">
                    <button onclick="updateQuantity(${index}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="updateQuantity(${index}, 1)">+</button>
                  </div>
                  <div class="cart-item__actions">
                    <button class="btn-remove" onclick="removeItem(${index})">删除</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          
          <div class="cart-summary">
            <h3 class="summary-title">订单摘要</h3>
            <div class="summary-row">
              <span>商品数量</span>
              <span>${itemCount}件</span>
            </div>
            <div class="summary-row">
              <span>商品金额</span>
              <span>¥${total.toFixed(2)}</span>
            </div>
            <div class="summary-row">
              <span>运费</span>
              <span style="color: #4CAF50;">免运费</span>
            </div>
            <div class="summary-total">
              <span>应付总额</span>
              <span class="total-price">¥${total.toFixed(2)}</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">
              💰 立即结算
            </button>
          </div>
        </div>
      `;
    }
    
    // 更新数量
    function updateQuantity(index, change) {
      let cart = storage.get('foodCart') || [];
      if (!cart[index]) return;
      
      cart[index].quantity += change;
      
      if (cart[index].quantity <= 0) {
        removeItem(index);
        return;
      }
      
      storage.set('foodCart', cart);
      renderCart();
      updateCartCount();
    }
    
    // 删除商品
    function removeItem(index) {
      let cart = storage.get('foodCart') || [];
      cart.splice(index, 1);
      storage.set('foodCart', cart);
      renderCart();
      updateCartCount();
      showToast('商品已删除', 'warning');
    }
    
    // 结算
    function checkout() {
      const cart = storage.get('foodCart') || [];
      if (cart.length === 0) {
        showToast('购物车为空', 'warning');
        return;
      }
      
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      
      showModal(`
        <div style="text-align: center; padding: 20px;">
          <p style="font-size: 18px; margin-bottom: 15px;">订单总金额：<strong style="color: #FF7F24; font-size: 24px;">¥${total.toFixed(2)}</strong></p>
          <p style="color: #999; font-size: 14px; margin-bottom: 25px;">此功能为演示，实际支付接口待接入</p>
          <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="btn btn--primary" onclick="closeModal(this.closest('.modal'))">取消</button>
            <button class="btn btn--success" onclick="confirmCheckout()">确认支付</button>
          </div>
        </div>
      `, '确认订单');
    }
    
    // 确认支付
    function confirmCheckout() {
      // 清空购物车
      storage.set('foodCart', []);
      
      // 关闭模态框
      document.querySelector('.modal')?.remove();
      
      // 显示成功提示
      showToast('支付成功！', 'success');
      
      // 重新渲染购物车
      setTimeout(() => {
        renderCart();
        updateCartCount();
      }, 1000);
    }
    
    // 更新购物车数量显示
    function updateCartCount() {
      const cart = storage.get('foodCart') || [];
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      const badge = document.querySelector('.cart-float__badge');
      if (badge) {
        badge.textContent = count;
        if (count > 0) {
          document.querySelector('.cart-float').classList.add('cart-float--show');
        } else {
          document.querySelector('.cart-float').classList.remove('cart-float--show');
        }
      }
    }
    
    // 页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
      renderCart();
    });
  </script>
</body>
</html>
